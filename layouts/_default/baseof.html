<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" dir="rtl">
{{ partial "head.html" . }}

<body class="light-mode">
    
    {{ partial "header.html" . }}

    <main id="main">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <div class="floating-container">
        <a href="https://wa.me/{{ .Site.Params.doctor.whatsapp }}" target="_blank" class="btn-float whatsapp" aria-label="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
        <button id="scrollTop" class="btn-float scroll-top" aria-label="Scroll Top">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <script>
        // 1. Dark Mode Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        
        // Check Local Storage
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.replace('light-mode', 'dark-mode');
        }

        if(toggleBtn){
            toggleBtn.addEventListener('click', () => {
                if (body.classList.contains('light-mode')) {
                    body.classList.replace('light-mode', 'dark-mode');
                    localStorage.setItem('theme', 'dark');
                } else {
                    body.classList.replace('dark-mode', 'light-mode');
                    localStorage.setItem('theme', 'light');
                }
            });
        }

        // 2. Navbar Scroll Effect
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
            
            // Show/Hide Scroll Top
            const scrollBtn = document.getElementById('scrollTop');
            if (window.scrollY > 300) scrollBtn.style.display = 'flex';
            else scrollBtn.style.display = 'none';
        });

        document.getElementById('scrollTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 3. CV Download Logic (HTML2PDF)
        document.getElementById('download-cv')?.addEventListener('click', () => {
            const element = document.getElementById('cv-template'); // Hidden Div
            const opt = {
                margin: 0,
                filename: 'Dr-Resume.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            // Show temporarily to capture
            element.style.display = 'block';
            html2pdf().set(opt).from(element).save().then(() => {
                element.style.display = 'none';
            });
        });
    </script>
</body>
</html>
